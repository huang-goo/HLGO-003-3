# AWS Configuration
aws.region=cn-north-1
aws.kinesis.stream.name=anomaly-detection-stream
aws.timestream.database.name=anomaly_detection_db
aws.timestream.table.name=anomaly_metrics
aws.sns.topic.arn=arn:aws-cn:sns:cn-north-1:123456789012:AnomalyAlerts
aws.cloudwatch.namespace=EdgeCloudAnomalyDetection

# Flink Configuration
cloud.flink.parallelism=4
cloud.flink.checkpoint.interval.ms=120000
cloud.flink.checkpoint.dir=s3://anomaly-detection-checkpoints/flink
cloud.flink.state.backend=rocksdb
cloud.flink.state.ttl.hours=24

# Deduplication Configuration
deduplication.bloomfilter.expected.insertions=1000000
deduplication.bloomfilter.fpp=0.001
deduplication.idempotency.ttl.hours=24

# Secondary Scoring Configuration
scoring.rcf.shingle.size=8
scoring.rcf.num.trees=200
scoring.rcf.sample.size=512
scoring.anomaly.threshold=2.0
scoring.adaptive.threshold.enabled=true
scoring.adaptive.threshold.history.size=1000

# Alert Configuration
alert.cooldown.seconds=300
alert.severity.threshold.low=1.5
alert.severity.threshold.medium=2.5
alert.severity.threshold.high=3.5
alert.channels=console,log,sns,cloudwatch

# Measurement Groups
measurement.groups=reactor_feed:temperature,pressure,flow|pressurizer:pressure,level,temperature|steam_generator:level,pressure,flow

# Exactly-Once Configuration
exactlyonce.enabled=true
exactlyonce.two.phase.commit=true
exactlyonce.idempotency.enabled=true