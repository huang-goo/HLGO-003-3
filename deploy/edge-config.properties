# Greengrass StreamManager Configuration
streammanager.stream.name=AnomalyDataStream
streammanager.stream.max_size=10737418240
streammanager.stream.timeout=30

# Edge Flink Configuration
edge.flink.parallelism=2
edge.flink.window.size.ms=60000
edge.flink.window.slide.ms=30000
edge.flink.checkpoint.interval.ms=60000
edge.flink.checkpoint.dir=file:///tmp/flink-checkpoints

# BloomFilter Configuration
bloomfilter.expected.insertions=100000
bloomfilter.false.positive.probability=0.01

# Clock Drift Correction
clockdrift.window.size=200
clockdrift.max.offset.ms=300000

# Offline Storage
offline.storage.dir=/tmp/greengrass-offline
offline.storage.max.size.gb=10
offline.message.ttl.hours=24
offline.retry.base.delay.ms=1000
offline.retry.max.delay.ms=60000

# RCF Configuration
rcf.shingle.size=4
rcf.num.trees=100
rcf.sample.size=256
rcf.anomaly.threshold=1.5

# Device Configuration
device.id=industrial-robot-001
device.location=factory-floor-a1
device.measurements=reactor_feed,pressurizer,steam_generator