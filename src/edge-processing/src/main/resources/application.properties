# Edge Processing Application Configuration
# ========================================

# AWS Region
region=eu-central-1

# Greengrass StreamManager Configuration
ggStreamHost=localhost
ggStreamPort=8089
ggSourceStreamName=TesimSourceStream
ggTargetStreamName=EdgeProcessedStream
ggStreamBatchSize=50
kinesisExportStreamName=tep-ingest-greengrass

# Offline Storage Configuration
offlineStoragePath=/tmp/edge-offline-storage

# Window Configuration
windowSizeMs=60000
slideSizeMs=60000

# Timestream Configuration (optional)
enableTimestream=false
TimeStreamRegion=eu-central-1
TimeStreamDbName=kdaflink
TimeStreamTableName=edge_anomalies
TimeStreamIngestBatchSize=50

# RCF Configuration for Edge
RcfShingleSize=1
RcfShingleCyclic=false
RcfNumberOfTrees=50
RcfSampleSize=128
RcfLambda=0.00078125
RcfRandomSeed=42

# Flink Configuration
flink.parallelism=2
flink.checkpoint.interval=60000
flink.checkpoint.mode=EXACTLY_ONCE
flink.restart.attempts=5
flink.restart.delay=10s
