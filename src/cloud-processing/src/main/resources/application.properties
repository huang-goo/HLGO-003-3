# Cloud Processing Application Configuration
# ========================================

# Kinesis Source Configuration
KinesisRegion=eu-central-1
InputStreamName=tep-ingest-greengrass
SHARD_GETRECORDS_INTERVAL_MILLIS=1000
SHARD_GETRECORDS_MAX=10000

# Timestream Configuration
TimeStreamRegion=eu-central-1
TimeStreamDbName=kdaflink
TimeStreamTableName=cloud_anomalies
AlertTimestreamTableName=cloud_alerts
TimeStreamIngestBatchSize=50

# Anomaly Detection Configuration
AnomalyThreshold=1.5
enableAlerts=true

# Notification Configuration
enableSns=false
SnsTopicArn=arn:aws:sns:eu-central-1:123456789012:anomaly-alerts
enableCloudWatch=true
CloudWatchNamespace=EdgeCloudAnomalyDetection

# Cloud RCF Configuration
CloudRcfShingleSize=4
CloudRcfShingleCyclic=true
CloudRcfNumberOfTrees=100
CloudRcfSampleSize=256
CloudRcfLambda=0.0001
CloudRcfRandomSeed=42

# Flink Configuration
flink.parallelism=4
flink.checkpoint.interval=60000
flink.checkpoint.mode=EXACTLY_ONCE
flink.restart.attempts=5
flink.restart.delay=10s
